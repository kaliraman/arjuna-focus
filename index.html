<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f2a" />
  <title>Arjun ka Nishan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- Brand + language toggle (top-left, persistent) -->
    <div id="brand" class="brand">
      <button id="lang-btn" class="lang-btn" aria-label="Change language" title="Language">🌐</button>
      <span class="brand-title" data-i18n="title">Arjun ka Nishan</span>
    </div>

    <!-- Pause / menu (top-right) -->
    <button id="menu-btn" class="icon-btn menu-corner" title="Menu" aria-label="Open menu">☰</button>

    <!-- HUD (top-left stack): level name, level/score, eye objective -->
    <div id="hud" class="hud hidden">
      <div id="level-name" class="level-name"></div>
      <div class="hud-row">
        <div class="hud-item" id="hud-level-item"><span class="hud-label" data-i18n="hud_level">Level</span><span id="hud-level">1</span></div>
        <div class="hud-item"><span class="hud-label" data-i18n="hud_score">Score</span><span id="hud-score">0</span></div>
      </div>
      <div id="objective" class="objective-hud">
        <span class="eye-icon" aria-label="Strike the eye">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="#f3f7f4"/>
            <circle cx="12" cy="12" r="9" fill="none" stroke="#ffcf6b" stroke-width="2.5"/>
            <circle cx="12" cy="12" r="3.6" fill="#0a1418"/>
            <circle cx="10.6" cy="10.6" r="1.3" fill="#fff"/>
          </svg>
        </span>
        <span id="objective-pips" class="objective-pips"></span>
      </div>
    </div>

    <!-- Shot feedback toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Word bloom (Sanskrit/Hindi praise on a strike) -->
    <div id="word-bloom" class="word-bloom hidden"></div>

    <!-- Title screen -->
    <section id="screen-title" class="screen">
      <div class="panel">
        <h1 class="title title-brand" data-i18n="title">Arjun ka Nishan</h1>
        <p class="lede" data-i18n="lede">Strike where the eye <em>will</em> be — not where it is.</p>
        <button id="btn-start" class="btn btn-primary" data-i18n="play">Play</button>
        <div class="title-links">
          <button id="btn-how" class="btn-link" data-i18n="howto">How to play</button>
          <button id="btn-legend" class="btn-link" data-i18n="legend">The legend</button>
        </div>
      </div>
    </section>

    <!-- How to play -->
    <section id="screen-how" class="screen hidden">
      <div class="panel">
        <h2 data-i18n="howto">How to play</h2>
        <ul class="how-list">
          <li data-i18n="how1"></li>
          <li data-i18n="how2"></li>
          <li data-i18n="how3"></li>
          <li data-i18n="how4"></li>
        </ul>
        <button id="btn-how-back" class="btn btn-primary" data-i18n="gotit">Got it</button>
      </div>
    </section>

    <!-- The legend -->
    <section id="screen-legend" class="screen hidden">
      <div class="panel">
        <h2 data-i18n="legend">The legend</h2>
        <p class="story" data-i18n="legendStory"></p>
        <p class="story-sub" data-i18n="legendSub">Excess is the enemy of mastery. See only the eye.</p>
        <button id="btn-legend-back" class="btn btn-primary" data-i18n="back">Back</button>
      </div>
    </section>

    <!-- Pause menu -->
    <section id="screen-menu" class="screen hidden">
      <div class="panel">
        <h2 data-i18n="paused">Paused</h2>
        <button id="btn-resume" class="btn btn-primary" data-i18n="resume">Resume</button>
        <div class="menu-links">
          <button id="btn-menu-how" class="btn-link" data-i18n="howto">How to play</button>
          <button id="btn-menu-legend" class="btn-link" data-i18n="legend">The legend</button>
          <button id="btn-menu-sound" class="btn-link">Sound: on</button>
          <button id="btn-menu-motion" class="btn-link">Motion: full</button>
          <button id="btn-menu-contrast" class="btn-link">High contrast: off</button>
          <button id="btn-menu-quit" class="btn-link" data-i18n="mainmenu">Main menu</button>
        </div>
      </div>
    </section>

    <!-- Finale (cleared the final challenge level) -->
    <section id="screen-finale" class="screen hidden">
      <div class="panel">
        <h2 data-i18n="finaleTitle">You mastered the eye</h2>
        <p id="finale-sub" class="over-sub"></p>
        <button id="btn-finale-again" class="btn btn-primary" data-i18n="playAgain">Play again</button>
        <div class="over-actions">
          <button id="btn-finale-endless" class="btn btn-ghost" data-i18n="keepGoing">Keep going · endless</button>
          <button id="btn-finale-home" class="btn-link" data-i18n="mainmenu">Main menu</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
